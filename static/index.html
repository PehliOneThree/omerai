<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmerAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0f;
  color: #e8e8f0;
  font-family: 'Syne', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 14px 20px;
  border-bottom: 1px solid #1e1e2e;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #13131a;
  flex-shrink: 0;
}

.logo {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, #7c6af7, #4ecdc4);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
}

.title {
  font-size: 19px;
  font-weight: 800;
  background: linear-gradient(90deg, #7c6af7, #4ecdc4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.dot {
  margin-left: auto;
  font-size: 11px;
  color: #4ecdc4;
  font-family: 'JetBrains Mono', monospace;
  background: rgba(78,205,196,0.1);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(78,205,196,0.2);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 3px; }

.msg {
  display: flex;
  gap: 10px;
  max-width: 780px;
  width: 100%;
  animation: fu 0.25s ease;
}

.msg.user { flex-direction: row-reverse; margin-left: auto; }

@keyframes fu {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.av {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg.user .av { background: linear-gradient(135deg, #4a4a8a, #2a2a5a); }
.msg.ai .av   { background: linear-gradient(135deg, #7c6af7, #4ecdc4); }

.bubble {
  padding: 11px 15px;
  border-radius: 13px;
  font-size: 14px;
  line-height: 1.6;
  max-width: calc(100% - 44px);
  word-break: break-word;
}

.msg.user .bubble {
  background: #1a1a2e;
  border: 1px solid #1e1e2e;
  border-top-right-radius: 3px;
}

.msg.ai .bubble {
  background: #13131a;
  border: 1px solid #1e1e2e;
  border-top-left-radius: 3px;
}

.tag {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.tag.brain  { color: #7c6af7; }
.tag.groq   { color: #4ecdc4; }
.tag.py     { color: #f7a76c; }
.tag.code   { color: #f7a76c; }
.tag.err    { color: #ff6b6b; }

.codeblock {
  background: #0d0d14;
  border: 1px solid #1e1e2e;
  border-radius: 7px;
  padding: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  color: #a8d8a8;
  margin: 7px 0 4px;
}

.outblock {
  background: rgba(78,205,196,0.05);
  border: 1px solid rgba(78,205,196,0.2);
  border-radius: 7px;
  padding: 8px 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #4ecdc4;
  margin-top: 5px;
  white-space: pre-wrap;
  word-break: break-word;
}

.errblock {
  background: rgba(255,107,107,0.05);
  border: 1px solid rgba(255,107,107,0.2);
  border-radius: 7px;
  padding: 8px 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #ff6b6b;
  margin-top: 5px;
}

.dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
.dots span {
  width: 5px;
  height: 5px;
  background: #7c6af7;
  border-radius: 50%;
  animation: b 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes b {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40%           { transform: translateY(-5px); opacity: 1; }
}

.input-area {
  padding: 14px 20px;
  border-top: 1px solid #1e1e2e;
  background: #13131a;
  flex-shrink: 0;
}

.row {
  display: flex;
  gap: 9px;
  align-items: flex-end;
  max-width: 780px;
  margin: 0 auto;
}

textarea {
  flex: 1;
  background: #0a0a0f;
  border: 1px solid #1e1e2e;
  border-radius: 11px;
  color: #e8e8f0;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  padding: 11px 15px;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 130px;
  line-height: 1.5;
  transition: border-color 0.2s;
}

textarea:focus { border-color: #7c6af7; }
textarea::placeholder { color: #6b6b80; }

#sendbtn {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #7c6af7, #4ecdc4);
  border: none;
  border-radius: 11px;
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
}

#sendbtn:hover   { opacity: 0.85; }
#sendbtn:active  { transform: scale(0.95); }
#sendbtn:disabled { opacity: 0.4; cursor: not-allowed; }

.welcome {
  text-align: center;
  padding: 36px 16px;
  color: #6b6b80;
}

.welcome h2 {
  font-size: 26px;
  font-weight: 800;
  background: linear-gradient(90deg, #7c6af7, #4ecdc4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 7px;
}

.welcome p { font-size: 13px; line-height: 1.6; }

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  justify-content: center;
  margin-top: 18px;
}

.chip {
  background: #13131a;
  border: 1px solid #1e1e2e;
  border-radius: 18px;
  padding: 6px 13px;
  font-size: 12px;
  color: #6b6b80;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Syne', sans-serif;
}

.chip:hover {
  border-color: #7c6af7;
  color: #7c6af7;
}
</style>
</head>
<body>

<header>
  <div class="logo">&#129302;</div>
  <div class="title">OmerAI</div>
  <div class="dot">&#9679; online</div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>Hey, I'm OmerAI</h2>
    <p>Ask me anything, do maths, run code, or let me build programs for you.</p>
    <div class="chips">
      <div class="chip" id="c1">What is DNA?</div>
      <div class="chip" id="c2">Create a calculator</div>
      <div class="chip" id="c3">What is today's date?</div>
      <div class="chip" id="c4">Is 997 a prime number?</div>
      <div class="chip" id="c5">100 celsius to fahrenheit</div>
      <div class="chip" id="c6">Make a password generator</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="row">
    <textarea id="inp" placeholder="Ask OmerAI anything..." rows="1"></textarea>
    <button id="sendbtn">&#10148;</button>
  </div>
</div>

<script>
var chatEl = document.getElementById("chat");
var inpEl  = document.getElementById("inp");
var btnEl  = document.getElementById("sendbtn");

document.getElementById("c1").addEventListener("click", function() { sendMsg("What is DNA?"); });
document.getElementById("c2").addEventListener("click", function() { sendMsg("Create a calculator"); });
document.getElementById("c3").addEventListener("click", function() { sendMsg("What is today's date?"); });
document.getElementById("c4").addEventListener("click", function() { sendMsg("Is 997 a prime number?"); });
document.getElementById("c5").addEventListener("click", function() { sendMsg("100 celsius to fahrenheit"); });
document.getElementById("c6").addEventListener("click", function() { sendMsg("Make a password generator"); });

btnEl.addEventListener("click", function() { sendMsg(null); });

inpEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMsg(null);
  }
});

inpEl.addEventListener("input", function() {
  inpEl.style.height = "auto";
  inpEl.style.height = Math.min(inpEl.scrollHeight, 130) + "px";
});

function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\n/g, "<br>");
}

function removeWelcome() {
  var w = document.getElementById("welcome");
  if (w) { w.remove(); }
}

function addBubble(role, html) {
  removeWelcome();
  var d = document.createElement("div");
  d.className = "msg " + role;
  var icon = (role === "user") ? "&#128100;" : "&#129302;";
  d.innerHTML = '<div class="av">' + icon + '</div><div class="bubble">' + html + "</div>";
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
  return d;
}

function addThinking() {
  return addBubble("ai", '<div class="dots"><span></span><span></span><span></span></div>');
}

function sendMsg(preset) {
  var msg = preset ? preset.trim() : inpEl.value.trim();
  if (!msg) { return; }
  inpEl.value = "";
  inpEl.style.height = "auto";
  btnEl.disabled = true;

  addBubble("user", esc(msg));
  var thinking = addThinking();

  fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    thinking.remove();
    var html = "";
    if (data.type === "brain") {
      html = '<div class="tag brain">brain</div>' + esc(data.answer);
    } else if (data.type === "python") {
      html = '<div class="tag py">python</div>' + esc(data.answer);
    } else if (data.type === "code") {
      html = '<div class="tag code">generated code</div>';
      html += '<div class="codeblock">' + esc(data.code) + "</div>";
      if (data.output) { html += '<div class="outblock">Output: ' + esc(data.output) + "</div>"; }
      if (data.error)  { html += '<div class="errblock">Error: ' + esc(data.error) + "</div>"; }
    } else if (data.type === "groq") {
      html = '<div class="tag groq">groq ai</div>' + esc(data.answer);
    } else if (data.type === "error") {
      html = '<div class="tag err">error</div>' + esc(data.answer);
    } else {
      html = esc(data.answer || "No response.");
    }
    addBubble("ai", html);
  })
  .catch(function(e) {
    thinking.remove();
    addBubble("ai", '<div class="tag err">error</div>Could not reach server. Is app.py running?');
  });

  btnEl.disabled = false;
  inpEl.focus();
}
</script>
</body>
</html>
